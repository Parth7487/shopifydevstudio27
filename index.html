    <!-- Google tag (gtag.js) - Delayed load for performance -->
    <script>
      (function() {
        var initialized = false;
        function initGtag() {
          if (initialized) return;
          initialized = true;
          
          window.removeEventListener('scroll', initGtag);
          window.removeEventListener('mousemove', initGtag);
          window.removeEventListener('touchstart', initGtag);
          window.removeEventListener('click', initGtag);
          
          var script = document.createElement('script');
          script.async = true;
          script.src = 'https://www.googletagmanager.com/gtag/js?id=G-CERY7F6NSC';
          document.head.appendChild(script);

          window.dataLayer = window.dataLayer || [];
          function gtag() {
            window.dataLayer.push(arguments);
          }
          window.gtag = gtag;
          gtag("js", new Date());
          gtag("config", "G-CERY7F6NSC");
        }

        window.addEventListener('scroll', initGtag, { passive: true });
        window.addEventListener('mousemove', initGtag, { passive: true });
        window.addEventListener('touchstart', initGtag, { passive: true });
        window.addEventListener('click', initGtag, { passive: true });

        window.addEventListener('load', function() {
          setTimeout(initGtag, 6000);
        });
      })();
